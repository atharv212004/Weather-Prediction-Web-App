<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Deep Insights</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.plot.ly/plotly-2.20.0.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
      body {
        background: linear-gradient(135deg, #E8F4FD 0%, #D0E8F8 100%);
        min-height: 100vh;
        color: #1a1a1a;
      }

      body.dark {
        background: linear-gradient(135deg, #0F1F3A 0%, #1E3A5F 100%);
        color: #FFFFFF;
      }

      body.dark * {
        color: #FFFFFF;
      }

      body.dark p, body.dark span, body.dark small, body.dark label, body.dark h3, body.dark h5 {
        color: #E0F0FF;
        opacity: 1;
      }

      .navbar {
        background: linear-gradient(90deg, rgba(74, 144, 226, 0.85), rgba(91, 163, 245, 0.85)) !important;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      body.dark .navbar {
        background: linear-gradient(90deg, rgba(45, 74, 107, 0.7), rgba(58, 90, 122, 0.7)) !important;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .navbar-brand {
        color: white !important;
        font-weight: 700;
      }

      .card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        margin-bottom: 20px;
      }

      body.dark .card {
        background: rgba(45, 74, 107, 0.5);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        color: #FFFFFF;
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      }

      body.dark .card * {
        color: #FFFFFF;
      }

      .card h5 {
        color: #4A90E2;
        font-weight: 700;
      }

      body.dark .card h5 {
        color: #FFFFFF;
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand" href="/"><i class="fas fa-cloud"></i> WeatherML</a>
        <div class="d-flex align-items-center gap-2">
          <button id="themeToggle" class="btn btn-light btn-sm me-2 glass" style="border-radius: 50%; width: 40px; height: 40px; border: 1px solid rgba(255, 255, 255, 0.3);">
            <i class="fas fa-moon"></i>
          </button>
          <a class="btn btn-light btn-sm glass" href="/" title="Back to prediction form" style="border: 1px solid rgba(255, 255, 255, 0.3);">
            <i class="fas fa-arrow-left me-1"></i> Back
          </a>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <h3>Deep Insights & Predictions</h3>
      <div class="row">
        <div class="col-md-6">
          <div class="card p-3">
            <h5>Feature Importances</h5>
            <div id="fi" style="height:280px"></div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card p-3">
            <h5>Prediction Details</h5>
            <ul id="details"></ul>
          </div>
        </div>
      </div>

      <div class="row mt-3">
        <div class="col-12">
          <div class="card p-3">
            <h5>Historical Comparison</h5>
            <div id="histComp" style="height:360px"></div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
    <script type="application/json" id="chart-data">
      {
        "preds": {{ preds | tojson | safe }},
        "series": {{ series | tojson | safe }},
        "importances": {{ importances | tojson | safe }}
      }
    </script>
    <script>
      (function() {
        'use strict';
        const dataElement = document.getElementById('chart-data');
        const chartData = JSON.parse(dataElement.textContent);
        const preds = chartData.preds;
        const series = chartData.series;
        const importances = chartData.importances;

        function updateCharts() {
          const isDark = document.body.classList.contains('dark');
          
          // Feature importances bar
          if(importances && importances.length){
            const fiTrace = { 
              x: importances, 
              y: ['latitude','longitude','year','month','day','dayofweek'], 
              type:'bar', 
              orientation:'h',
              marker: { color: isDark ? '#5BA3F5' : '#4A90E2' }
            };
            Plotly.newPlot('fi', [fiTrace], {
              margin:{l:100},
              paper_bgcolor: isDark ? 'rgba(45, 74, 107, 0.5)' : 'white',
              plot_bgcolor: isDark ? 'rgba(45, 74, 107, 0.4)' : 'rgba(245, 247, 250, 0.5)',
              font: { color: isDark ? '#FFFFFF' : '#1a1a1a' },
              xaxis: { color: isDark ? '#E0F0FF' : '#1a1a1a', gridcolor: isDark ? 'rgba(255, 255, 255, 0.2)' : '#e2e8f0' },
              yaxis: { color: isDark ? '#E0F0FF' : '#1a1a1a', gridcolor: isDark ? 'rgba(255, 255, 255, 0.2)' : '#e2e8f0' }
            });
          }

          // Historical comparison: temp vs predicted
          const hist = { 
            x: series.dates, 
            y: series.temperature, 
            mode:'lines', 
            name:'Historical',
            line: { color: isDark ? '#5BA3F5' : '#4A90E2', width: 2 }
          };
          const predPoint = { 
            x:[series.dates[series.dates.length-1] || new Date().toISOString().slice(0,10)], 
            y:[preds.temp], 
            mode:'markers', 
            marker:{size:12, color:'#FF6B35'}, 
            name:'Predicted' 
          };
          Plotly.newPlot('histComp', [hist, predPoint], {
            margin:{t:20},
            paper_bgcolor: isDark ? 'rgba(45, 74, 107, 0.5)' : 'white',
            plot_bgcolor: isDark ? 'rgba(45, 74, 107, 0.4)' : 'rgba(245, 247, 250, 0.5)',
            font: { color: isDark ? '#FFFFFF' : '#1a1a1a' },
            xaxis: { color: isDark ? '#E0F0FF' : '#1a1a1a', gridcolor: isDark ? 'rgba(255, 255, 255, 0.2)' : '#e2e8f0' },
            yaxis: { color: isDark ? '#E0F0FF' : '#1a1a1a', gridcolor: isDark ? 'rgba(255, 255, 255, 0.2)' : '#e2e8f0' }
          });
        }

        // Details list
        const d = document.getElementById('details');
        if(preds){
          for(const k of Object.keys(preds)){
            const li = document.createElement('li');
            li.textContent = `${k}: ${preds[k]}`;
            d.appendChild(li);
          }
        }

        // Initial chart render
        updateCharts();

        // Update charts when theme changes
        const observer = new MutationObserver(() => {
          updateCharts();
        });
        observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });
      })();
    </script>
  </body>
</html>
