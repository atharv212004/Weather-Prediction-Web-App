<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Deep Insights</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.20.0.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">Weather ML</a>
      </div>
    </nav>

    <main class="container py-4">
      <h3>Deep Insights & Predictions</h3>
      <div class="row">
        <div class="col-md-6">
          <div class="card p-3">
            <h5>Feature Importances</h5>
            <div id="fi" style="height:280px"></div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card p-3">
            <h5>Prediction Details</h5>
            <ul id="details"></ul>
          </div>
        </div>
      </div>

      <div class="row mt-3">
        <div class="col-12">
          <div class="card p-3">
            <h5>Historical Comparison</h5>
            <div id="histComp" style="height:360px"></div>
          </div>
        </div>
      </div>
    </main>

    <script>
      const preds = {{ preds | tojson | safe }};
      const series = {{ series | tojson | safe }};
      const importances = {{ importances | tojson | safe }};

      // Feature importances bar
      if(importances && importances.length){
        const fiTrace = { x: importances, y: ['latitude','longitude','year','month','day','dayofweek'], type:'bar', orientation:'h' };
        Plotly.newPlot('fi', [fiTrace], {margin:{l:100}});
      }

      // Details list
      const d = document.getElementById('details');
      if(preds){
        for(const k of Object.keys(preds)){
          const li = document.createElement('li');
          li.textContent = `${k}: ${preds[k]}`;
          d.appendChild(li);
        }
      }

      // Historical comparison: temp vs predicted
      const hist = { x: series.dates, y: series.temperature, mode:'lines', name:'Historical' };
      const predPoint = { x:[series.dates[series.dates.length-1] || new Date().toISOString().slice(0,10)], y:[preds.temp], mode:'markers', marker:{size:12, color:'red'}, name:'Predicted' };
      Plotly.newPlot('histComp', [hist, predPoint], {margin:{t:20}});
    </script>
  </body>
</html>
